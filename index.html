  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #ff4d00;
      --accent2: #ffcc00;
      --text: #f0f0f0;
      --muted: #666;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    #homePage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, #ff4d0015 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .home-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .home-title {
      font-family: "Bebas Neue", cursive;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 0.9;
      text-align: center;
      margin-bottom: 12px;
    }

    .home-title span {
      display: block;
      color: var(--accent2);
    }

    .home-title .outline {
      color: transparent;
      -webkit-text-stroke: 2px var(--text);
      opacity: 0.15;
    }

    .home-subtitle {
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
      margin-bottom: 48px;
      font-weight: 300;
    }

    .search-box {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      position: relative;
    }

    .search-box::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      background: linear-gradient(135deg, #ff4d0033, transparent, #ffcc0022);
      z-index: -1;
    }

    .search-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: block;
    }

    .search-input-wrap {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: "DM Sans", sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: #3a3a3a;
    }

    .go-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      color: white;
      font-family: "Bebas Neue", cursive;
      font-size: 1.2rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .go-btn:hover {
      background: #e04400;
    }

    .go-btn:active {
      transform: scale(0.96);
    }

    .error-msg {
      margin-top: 14px;
      color: #ff6b6b;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
      text-align: center;
    }

    .member-count {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    .member-count strong {
      color: var(--accent2);
    }

    /* RESULT PAGE */
    #resultPage {
      display: none;
      min-height: 100vh;
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      color: var(--muted);
      font-family: "DM Sans", sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s, border-color 0.2s;
    }

    .back-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }

    .result-animal-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 12px;
      animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes bounceIn {
      from {
        opacity: 0;
        transform: scale(0.4) rotate(-10deg);
      }

      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .result-greeting {
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-name {
      font-family: "Bebas Neue", cursive;
      font-size: clamp(3rem, 10vw, 5.5rem);
      line-height: 1;
      color: var(--text);
      margin-bottom: 4px;
    }

    .result-animal-label {
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 32px;
    }

    .info-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      animation: slideUp 0.4s ease both;
    }

    .info-card.full {
      grid-column: 1 / -1;
    }

    .info-card.accent-card {
      border-color: var(--accent);
      background: #ff4d0010;
    }

    .info-card.gold-card {
      border-color: var(--accent2);
      background: #ffcc0008;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
      display: block;
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .crutch-value {
      font-family: "Bebas Neue", cursive;
      font-size: 1.8rem;
      color: var(--accent2);
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .funny-img-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      animation: slideUp 0.5s 0.2s ease both;
      position: relative;
    }

    .funny-img-wrap img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      display: block;
    }

    .img-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: linear-gradient(transparent, #000000cc);
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
      font-style: italic;
    }

    .video-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      animation: slideUp 0.6s 0.3s ease both;
    }

    .video-wrap iframe {
      width: 100%;
      height: 280px;
      display: block;
      border: none;
    }

    .video-caption {
      padding: 10px 16px;
      font-size: 0.85rem;
      color: var(--accent2);
      font-weight: 600;
      text-align: center;
      background: #ffcc0010;
    }

    .share-line {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 400px) {
      .info-cards {
        grid-template-columns: 1fr;
      }

      .info-card.full {
        grid-column: 1;
      }
    }
  </style>
</head>

    function lookup() {
      const input = document.getElementById('nameInput').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      if (!input) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = '⚠️ Please enter your name!';
        return;
      }
      const key = Object.keys(members).find(k => k.toLowerCase() === input.toLowerCase());

        errorMsg.style.display = 'block';
        errorMsg.textContent = `😕 "${input}" not found! Check spelling. `;
        return;
      }
      errorMsg.style.display = 'none';
      showResult(key, members[key]);
    }

    function showResult(name, data) {
      document.getElementById('resAnimalEmoji').textContent = data.emoji;
      document.getElementById('resName').textContent = name.toUpperCase();
      document.getElementById('resAnimalLabel').textContent = '🐾 ' + data.animal;
      document.getElementById('resCrutch').textContent = '"' + data.crutch + '"';
      document.getElementById('resAnimal').textContent = data.animal;
      document.getElementById('resAnimalReason').textContent = data.reason;
      document.getElementById('resMessage').textContent = data.message;
      const imgWrap = document.getElementById('funnyImgWrap');
      const img = document.getElementById('funnyImg');
      if (data.img) {
        img.src = data.img;
        document.getElementById('imgCaption').textContent = data.imgCaption || '';
        imgWrap.style.display = 'block';
      } else {
        imgWrap.style.display = 'none';
      }
      const videoWrap = document.getElementById('videoWrap');
      const videoFrame = document.getElementById('videoFrame');
      if (data.video) {
        videoFrame.src = data.video;
        document.getElementById('videoCaption').textContent = data.videoCaption || '';
        videoWrap.style.display = 'block';
      } else {
        videoFrame.src = '';
        videoWrap.style.display = 'none';
      }
      document.getElementById('homePage').style.display = 'none';
      document.getElementById('resultPage').style.display = 'block';
      window.scrollTo(0, 0);
    }

    function goBack() {
      document.getElementById('resultPage').style.display = 'none';
      document.getElementById('homePage').style.display = 'flex';
      document.getElementById('nameInput').value = '';
      document.getElementById('videoFrame').src = '';
      window.scrollTo(0, 0);
    }
  </script>
</body>

</html>
